<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' file: data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About MaplatEditor</title>
   <!-- ... styles ... -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 40px 20px 20px 20px;
            overflow: hidden !important;
            text-align: center;
            user-select: none;
            cursor: default;
            color: #333;
            box-sizing: border-box;
        }
        
        .logo-container {
            margin: 0 0 20px 0;
        }
        
        .logo-img {
            width: 128px;
            height: 128px;
        }

        h1 {
            font-size: 24px;
            font-weight: normal;
            margin: 0 0 5px 0;
            color: #333;
        }

        .version {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .copyright {
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
        }

        .versions-table {
            font-size: 12px;
            color: #888;
            line-height: 1.5;
            text-align: left;
            margin-top: 10px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        
        .versions-table span {
            display: inline-block;
            width: 70px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="icon.png" class="logo-img" id="logo" alt="MaplatEditor">
    </div>
    
    <h1 id="productName">MaplatEditor</h1>
    <div class="version">Version 0.7.0</div>
    
    <div class="copyright">Copyright (c) 2015-2022 Code for History</div>
    
    <div class="versions-table" id="versions">
        Loading versions...
    </div>

    <script>
        try {
            // direct access via nodeIntegration
            const v = process.versions;
            document.getElementById('versions').innerHTML = `
                <div><span>electron</span>: ${v.electron}</div>
                <div><span>chrome</span>: ${v.chrome}</div>
                <div><span>node</span>: ${v.node}</div>
                <div><span>v8</span>: ${v.v8}</div>
            `;
        } catch (e) {
            document.getElementById('versions').innerHTML = 
                '<div style="color:red">Error: ' + e.message + '</div>';
        }
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
